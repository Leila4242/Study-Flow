{% extends "base.html" %}

{% block title %}Change Password · Study Planner{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Change Password</h1>
        <p class="page-subtitle">Choose a strong, unique password.</p>
    </div>
    <a href="{{ url_for('profile') }}" class="btn btn-secondary">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back to Profile</span>
    </a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('change_password') }}" novalidate>
        <div class="form-group">
            <label for="current_password">Current password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="current_password"
                    name="current_password"
                    required
                    autofocus
                >
                <button type="button" class="toggle-password" aria-label="Show password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label for="new_password">New password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="new_password"
                    name="new_password"
                    placeholder="At least 6 characters"
                    minlength="6"
                    required
                >
                <button type="button" class="toggle-password" aria-label="Show password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label for="confirm_new_password">Confirm new password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="confirm_new_password"
                    name="confirm_new_password"
                    placeholder="Re-enter your new password"
                    minlength="6"
                    required
                    data-match="new_password"
                >
                <button type="button" class="toggle-password" aria-label="Show password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-check"></i>
                <span>Update Password</span>
            </button>
            <a href="{{ url_for('profile') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
