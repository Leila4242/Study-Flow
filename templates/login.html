{% extends "auth_layout.html" %}

{% block title %}Log In · Study Planner{% endblock %}

{% block auth_content %}
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Log in to keep your study plan on track.</p>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form" novalidate>
        <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@university.edu"
                    value="{{ email or '' }}"
                    required
                    autofocus
                >
            </div>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    required
                >
                <button type="button" class="toggle-password" aria-label="Show password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
            <span>Log In</span>
            <i class="fa-solid fa-arrow-right"></i>
        </button>
    </form>
{% endblock %}

{% block footer_note %}
    Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
{% endblock %}
