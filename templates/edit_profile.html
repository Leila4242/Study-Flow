{% extends "base.html" %}

{% block title %}Edit Profile · Study Planner{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Edit Profile</h1>
        <p class="page-subtitle">Update your name and email address.</p>
    </div>
    <a href="{{ url_for('profile') }}" class="btn btn-secondary">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back to Profile</span>
    </a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('edit_profile') }}" novalidate>
        <div class="form-group">
            <label for="fullname">Full name</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input
                    type="text"
                    id="fullname"
                    name="fullname"
                    value="{{ fullname or '' }}"
                    required
                    autofocus
                >
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ email or '' }}"
                    required
                >
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-check"></i>
                <span>Save Changes</span>
            </button>
            <a href="{{ url_for('profile') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
